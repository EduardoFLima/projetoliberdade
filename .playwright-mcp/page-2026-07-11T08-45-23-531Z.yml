  - main [ref=e26]:
    - generic [ref=e27]:
      - img "Criança em sessão de equoterapia ao pôr do sol, conduzida por uma terapeuta no campo" [ref=e29]
      - generic [ref=e31]:
        - heading "Nossa História" [level=1] [ref=e32]
        - paragraph [ref=e33]: Terapia e reabilitação equestre desde 2006. Uma jornada de dedicação, cuidado e liberdade.
    - generic [ref=e36]:
      - generic [ref=e37]:
        - paragraph [ref=e38]: O Projeto Liberdade foi fundado no dia 29 de setembro de 2006 pelo Educador Físico André Amaral e a Fisioterapeuta Karina Hollatz; ambos tinham como objetivo promover a reabilitação de forma lúdica. No início, o casal promovia atividades de recreação, passeios e atividades direcionadas para a pessoa com deficiência, sempre pensando na promoção da qualidade de vida e na reabilitação de forma prazerosa.
        - paragraph [ref=e39]: Com o passar dos anos, passaram a se dedicar também, a Terapia Assistida por Animais, onde cavalo, cachorro, coelho, tartaruga estavam presentes durante as atividades e atendimentos realizados. Em Outubro (12/10) do ano seguinte, se instalaram na zona Norte de São Paulo e abriram o Centro de Equoterapia Projeto Liberdade, onde através da intervenção de terapeutas e do cavalo, passaram a oferecer atendimentos diários para pessoas com deficiências física, intelectual, auditiva, visual e múltipla.
        - paragraph [ref=e40]: A proposta inicial do Projeto Liberdade sempre foi promover o atendimento terapêutico de forma diferenciada, onde a intervenção não acontecesse somente dentro de consultório, instituição, clínica... Desejava-se que o aprendizado e a evolução fossem consequência de atividades lúdicas e ao ar livre.
        - paragraph [ref=e41]: Em 2008 se tornaram uma empresa privada sem fins lucrativos, contrataram mais profissionais para integrar a equipe, e começaram a ser mais atuantes no meio da reabilitação assistida por animais. Participaram de feiras como a Reatech, Feira Internacional de Tecnologias em Reabilitação, Inclusão e Acessibilidade; Foram premiados pelo Governo do Estado de São Paulo no prêmio Ações Inclusivas no ano de 2010; Deram palestras, entrevistas em rádio e televisão; Desenvolveram uma vestimenta para uso na Equoterapia; Promoveram Festivais de Equoterapia e nunca mais pararam!!!
        - blockquote [ref=e42]:
          - paragraph [ref=e43]: “São 16 anos de dedicação, de busca de conhecimentos, de gratidão pela nossa história... Hoje somos reconhecidos pelo nosso trabalho e queremos cada vez mais estar atuantes no meio da Habilitação e Reabilitação de Pessoas com Deficiência, um trabalho que nos motiva diariamente” diz André Amaral e Karina Hollatz.
      - img "André Amaral e Karina Hollatz, fundadores do Projeto Liberdade, ao lado de um cavalo branco no haras" [ref=e45]
